<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Mumma!</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5f8; text-align: center; margin: 0; overflow: hidden; }
        
        #start-screen { position: fixed; width: 100%; height: 100%; background: white; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .balloon { width: 60px; height: 80px; background: #ff6b6b; border-radius: 50%; position: absolute; bottom: -100px; cursor: pointer; animation: floatUp 6s linear infinite; }
        .balloon::before { content: ""; position: absolute; bottom: -10px; left: 25px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 10px solid #ff6b6b; }

        @keyframes floatUp {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(-110vh) translateX(20px); }
        }

        .photo-card { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 10px; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-bottom: 30px solid white; border-radius: 5px; z-index: 5; }
        .photo-card img { width: 250px; height: auto; border-radius: 3px; }

        #final-letter { display: none; padding: 40px; }
        button { padding: 15px 30px; font-size: 1.2rem; background: #ff4757; color: white; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Hey Mumma! ❤️</h1>
        <p>Click below to start the magic</p>
        <button onclick="startGame()">Start the Magic ✨</button>
    </div>

    <div id="game-area"></div>

    <div id="photo-reveal" class="photo-card">
        <img id="current-img" src="" alt="Memory">
        <p id="caption">Growing up with you is my fav part!</p>
    </div>

    <div id="final-letter">
        <h1>Happy Mother's Day!</h1>
        <p>You're the best thing that's ever happened to me. Love you, Mumma!</p>
    </div>

    <script>
        const photos = [
            "https://via.placeholder.com/250/FF6B6B/FFFFFF?text=Photo+1", 
            "https://via.placeholder.com/250/4834D4/FFFFFF?text=Photo+2",
            "https://via.placeholder.com/250/6AB04C/FFFFFF?text=Photo+3"
        ];
        let currentPhotoIndex = 0;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            createBalloons();
        }

        function createBalloons() {
            const gameArea = document.getElementById('game-area');
            for (let i = 0; i < 5; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 80 + '%';
                b.style.animationDelay = (i * 1.5) + 's';
                b.onclick = () => popBalloon(b);
                gameArea.appendChild(b);
            }
        }

        function popBalloon(element) {
            element.style.display = 'none';
            
            if (currentPhotoIndex < photos.length) {
                const card = document.getElementById('photo-reveal');
                document.getElementById('current-img').src = photos[currentPhotoIndex];
                card.style.display = 'block';
                
                setTimeout(() => {
                    card.style.display = 'none';
                    currentPhotoIndex++;
                    if (currentPhotoIndex === photos.length) showLetter();
                }, 2000);
            }
        }

        function showLetter() {
            document.getElementById('final-letter').style.display = 'block';
        }
    </script>
</body>
</html>
